<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TG ↔ DC Bridge – Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #5865f2;
      --accent-tg: #26a5e4;
      --danger: #ed4245;
      --success: #57f287;
      --warn: #fee75c;
      --text: #e2e8f0;
      --muted: #8b92b5;
      --radius: 10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 64px;
    }

    header {
      max-width: 960px;
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    header h1 span.tg  { color: var(--accent-tg); }
    header h1 span.dc  { color: var(--accent); }

    #status-bar {
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      gap: 16px;
      align-items: center;
    }

    #status-bar .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      margin-right: 4px;
    }

    main { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

    /* ── ADD PAIR CARD ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }

    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: var(--text); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.wide { grid-column: 1 / -1; }

    label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }

    input[type="text"], select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 0.875rem;
      outline: none;
      transition: border-color .15s;
    }

    input[type="text"]:focus, select:focus { border-color: var(--accent); }

    button {
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 9px 18px;
      transition: opacity .15s, background .15s;
    }

    button:hover { opacity: 0.88; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger  { background: var(--danger);  color: #fff; padding: 6px 12px; font-size: 0.8rem; }
    .btn-sm      { padding: 5px 10px; font-size: 0.78rem; }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    #add-form button[type="submit"] { margin-top: 6px; align-self: flex-end; }

    /* ── PAIRS LIST ──────────────────────────────────────────────────────── */
    #pairs-list { display: flex; flex-direction: column; gap: 16px; }

    .pair-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .pair-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pair-ids {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      border-radius: 5px;
      padding: 3px 8px;
      font-weight: 600;
    }

    .badge.tg  { background: rgba(38,165,228,.15); color: var(--accent-tg); }
    .badge.dc  { background: rgba(88,101,242,.15); color: #818cf8; }
    .badge.label { background: var(--surface2); color: var(--muted); font-weight: 400; }

    .pair-actions { display: flex; gap: 8px; align-items: center; }

    /* ── TRANSLATION PANEL ───────────────────────────────────────────────── */
    .translation-panel {
      border-top: 1px solid var(--border);
      background: var(--surface2);
      padding: 16px 20px;
      display: none;
    }

    .translation-panel.open { display: block; }

    .translation-panel h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .trans-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 560px) { .trans-grid { grid-template-columns: 1fr; } }

    .trans-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .trans-section h4 {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* toggle switch */
    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 22px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(18px); }

    .toggle-label { font-size: 0.82rem; color: var(--text); }

    .trans-footer {
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .provider-row { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--muted); }
    .provider-row select { padding: 4px 8px; font-size: 0.8rem; }

    .save-status { font-size: 0.78rem; color: var(--success); opacity: 0; transition: opacity .3s; }
    .save-status.visible { opacity: 1; }

    /* ── MEDIA PANEL ─────────────────────────────────────────────────────── */
    .media-panel {
      border-top: 1px solid var(--border);
      background: var(--surface2);
      padding: 16px 20px;
      display: none;
    }

    .media-panel.open { display: block; }

    .media-panel h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .media-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 560px) { .media-grid { grid-template-columns: 1fr; } }

    .media-section { display: flex; flex-direction: column; gap: 8px; }

    .media-section h4 {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    /* ── EMPTY STATE ─────────────────────────────────────────────────────── */
    #empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }

    #empty-state p { margin-top: 8px; font-size: 0.875rem; }

    /* ── TOAST ───────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.85rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 999;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-color: var(--danger); color: var(--danger); }
    #toast.ok    { border-color: var(--success); color: var(--success); }
  </style>
</head>
<body>

<header>
  <h1><span class="tg">Telegram</span> ↔ <span class="dc">Discord</span> Bridge</h1>
  <div id="status-bar">
    <span><span class="dot"></span>Running</span>
    <span id="stat-uptime">uptime: –</span>
    <span id="stat-pairs">0 pairs</span>
    <span id="stat-translation">–</span>
  </div>
</header>

<main>
  <!-- ADD PAIR -->
  <div class="card">
    <h2>Add Channel Pair</h2>
    <form id="add-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="f-label">Label (optional)</label>
          <input type="text" id="f-label" placeholder="e.g. General" />
        </div>
        <div class="form-group">
          <label for="f-tg">Telegram Chat ID</label>
          <input type="text" id="f-tg" placeholder="-1001234567890" required />
        </div>
        <div class="form-group">
          <label for="f-dc">Discord Channel ID</label>
          <input type="text" id="f-dc" placeholder="123456789012345678" required />
        </div>
        <div class="form-group wide">
          <label for="f-wh">Discord Webhook URL</label>
          <input type="text" id="f-wh" placeholder="https://discord.com/api/webhooks/..." required />
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:14px;">
        <button type="submit" class="btn-primary">Add Pair</button>
      </div>
    </form>
  </div>

  <!-- PAIRS -->
  <div class="card" style="padding:0;border:none;background:transparent;">
    <div id="pairs-list"></div>
    <div id="empty-state" style="display:none;">
      <strong>No pairs configured yet.</strong>
      <p>Add your first Telegram ↔ Discord channel pair above.</p>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
const LANGUAGES = [
  'English','German','French','Spanish','Italian','Portuguese','Dutch',
  'Polish','Russian','Turkish','Arabic','Chinese (Simplified)','Japanese','Korean',
  'Ukrainian','Swedish','Danish','Finnish','Norwegian','Czech','Slovak',
  'Romanian','Hungarian','Greek','Hebrew','Hindi','Bengali','Indonesian','Vietnamese'
];

// All supported translation providers with labels and type info
const PROVIDERS = [
  // ── AI models ───────────────────────────────────────────────────────────────
  { id: 'anthropic',      label: 'Anthropic (Claude Haiku)', group: 'AI Models',           keyEnv: 'anthropic' },
  { id: 'openai',         label: 'OpenAI (GPT-4o-mini)',     group: 'AI Models',           keyEnv: 'openai' },
  { id: 'ollama',         label: 'Ollama (local LLM)',       group: 'AI Models',           keyEnv: 'ollama' },
  // ── Dedicated translation APIs ───────────────────────────────────────────────
  { id: 'google',         label: 'Google Translate',         group: 'Translation APIs',    keyEnv: 'google' },
  { id: 'deepl',          label: 'DeepL',                    group: 'Translation APIs',    keyEnv: 'deepl' },
  { id: 'libretranslate', label: 'LibreTranslate (local)',   group: 'Translation APIs',    keyEnv: 'libretranslate' },
  { id: 'microsoft',      label: 'Microsoft Translator',     group: 'Translation APIs',    keyEnv: 'microsoft' },
];

// ── API helpers ──────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : undefined,
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

// ── Toast ────────────────────────────────────────────────────────────────────

let toastTimer;
function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ── Status bar ───────────────────────────────────────────────────────────────

async function refreshStatus() {
  try {
    const s = await api('GET', '/api/status');
    const h = Math.floor(s.uptime / 3600);
    const m = Math.floor((s.uptime % 3600) / 60);
    document.getElementById('stat-uptime').textContent = `uptime: ${h}h ${m}m`;
    document.getElementById('stat-pairs').textContent  = `${s.pairs} pair${s.pairs !== 1 ? 's' : ''}`;

    // Show which providers are available (key set or always-on)
    const tp = s.translationProviders ?? {};
    const active = PROVIDERS.filter(p => tp[p.id]).map(p => p.label.split(' (')[0]);
    document.getElementById('stat-translation').textContent =
      active.length ? active.join(' · ') : 'No translation providers configured';

    // Store globally for the provider dropdown
    window._providerStatus = tp;
  } catch { /* ignore */ }
}

// ── Render pairs ─────────────────────────────────────────────────────────────

function langSelect(id, value) {
  const sel = document.createElement('select');
  sel.id = id;
  for (const lang of LANGUAGES) {
    const opt = document.createElement('option');
    opt.value = lang;
    opt.textContent = lang;
    if (lang === value) opt.selected = true;
    sel.appendChild(opt);
  }
  return sel;
}

function toggle(id, checked, onChange) {
  const label = document.createElement('label');
  label.className = 'toggle';
  label.title = checked ? 'Enabled' : 'Disabled';
  const inp = document.createElement('input');
  inp.type = 'checkbox';
  inp.id = id;
  inp.checked = checked;
  inp.addEventListener('change', () => onChange(inp.checked));
  const span = document.createElement('span');
  span.className = 'slider';
  label.appendChild(inp);
  label.appendChild(span);
  return label;
}

function buildTranslationPanel(pair) {
  const t = pair.translation ?? {
    enabled: false, provider: 'anthropic',
    tgToDiscord: { enabled: false, targetLanguage: 'English' },
    discordToTg: { enabled: false, targetLanguage: 'English' }
  };

  const panel = document.createElement('div');
  panel.className = 'translation-panel';
  panel.id = `trans-${pair.id}`;

  const heading = document.createElement('h3');
  heading.textContent = 'Translation Settings';
  panel.appendChild(heading);

  // Master enable
  const masterRow = document.createElement('div');
  masterRow.className = 'toggle-row';
  masterRow.style.marginBottom = '14px';

  const masterToggle = toggle(`master-${pair.id}`, t.enabled, async (val) => {
    await saveTranslation(pair.id, { enabled: val });
    masterToggle.title = val ? 'Enabled' : 'Disabled';
    grid.style.opacity = val ? '1' : '0.4';
    grid.style.pointerEvents = val ? '' : 'none';
  });

  const masterLabel = document.createElement('span');
  masterLabel.className = 'toggle-label';
  masterLabel.textContent = 'Enable translation for this pair';

  masterRow.appendChild(masterToggle);
  masterRow.appendChild(masterLabel);
  panel.appendChild(masterRow);

  // Direction grids
  const grid = document.createElement('div');
  grid.className = 'trans-grid';
  grid.style.opacity = t.enabled ? '1' : '0.4';
  grid.style.pointerEvents = t.enabled ? '' : 'none';

  // TG → DC
  const tgDcSection = document.createElement('div');
  tgDcSection.className = 'trans-section';

  const tgDcTitle = document.createElement('h4');
  tgDcTitle.textContent = '🔵 Telegram → Discord';
  tgDcSection.appendChild(tgDcTitle);

  const tgDcRow = document.createElement('div');
  tgDcRow.className = 'toggle-row';
  const tgDcToggle = toggle(`tgdc-${pair.id}`, t.tgToDiscord.enabled, async (val) => {
    await saveTranslation(pair.id, { tgToDiscord: { enabled: val } });
  });
  const tgDcLabel = document.createElement('span');
  tgDcLabel.className = 'toggle-label';
  tgDcLabel.textContent = 'Translate messages';
  tgDcRow.appendChild(tgDcToggle);
  tgDcRow.appendChild(tgDcLabel);
  tgDcSection.appendChild(tgDcRow);

  const tgDcLangLabel = document.createElement('label');
  tgDcLangLabel.htmlFor = `tgdc-lang-${pair.id}`;
  tgDcLangLabel.style.cssText = 'font-size:.78rem;color:var(--muted)';
  tgDcLangLabel.textContent = 'Target language';
  tgDcSection.appendChild(tgDcLangLabel);

  const tgDcLang = langSelect(`tgdc-lang-${pair.id}`, t.tgToDiscord.targetLanguage);
  tgDcLang.addEventListener('change', async () => {
    await saveTranslation(pair.id, { tgToDiscord: { targetLanguage: tgDcLang.value } });
  });
  tgDcSection.appendChild(tgDcLang);

  // DC → TG
  const dcTgSection = document.createElement('div');
  dcTgSection.className = 'trans-section';

  const dcTgTitle = document.createElement('h4');
  dcTgTitle.textContent = '🟣 Discord → Telegram';
  dcTgSection.appendChild(dcTgTitle);

  const dcTgRow = document.createElement('div');
  dcTgRow.className = 'toggle-row';
  const dcTgToggle = toggle(`dctg-${pair.id}`, t.discordToTg.enabled, async (val) => {
    await saveTranslation(pair.id, { discordToTg: { enabled: val } });
  });
  const dcTgLabel = document.createElement('span');
  dcTgLabel.className = 'toggle-label';
  dcTgLabel.textContent = 'Translate messages';
  dcTgRow.appendChild(dcTgToggle);
  dcTgRow.appendChild(dcTgLabel);
  dcTgSection.appendChild(dcTgRow);

  const dcTgLangLabel = document.createElement('label');
  dcTgLangLabel.htmlFor = `dctg-lang-${pair.id}`;
  dcTgLangLabel.style.cssText = 'font-size:.78rem;color:var(--muted)';
  dcTgLangLabel.textContent = 'Target language';
  dcTgSection.appendChild(dcTgLangLabel);

  const dcTgLang = langSelect(`dctg-lang-${pair.id}`, t.discordToTg.targetLanguage);
  dcTgLang.addEventListener('change', async () => {
    await saveTranslation(pair.id, { discordToTg: { targetLanguage: dcTgLang.value } });
  });
  dcTgSection.appendChild(dcTgLang);

  grid.appendChild(tgDcSection);
  grid.appendChild(dcTgSection);
  panel.appendChild(grid);

  // Footer — provider picker + save status
  const footer = document.createElement('div');
  footer.className = 'trans-footer';

  const providerRow = document.createElement('div');
  providerRow.className = 'provider-row';

  const provLabel = document.createElement('span');
  provLabel.textContent = 'Provider: ';
  providerRow.appendChild(provLabel);

  const provSel = document.createElement('select');
  const status = window._providerStatus ?? {};

  // Group providers
  const groups = {};
  for (const p of PROVIDERS) {
    if (!groups[p.group]) groups[p.group] = [];
    groups[p.group].push(p);
  }

  for (const [groupName, items] of Object.entries(groups)) {
    const grp = document.createElement('optgroup');
    grp.label = groupName;
    for (const p of items) {
      const opt = document.createElement('option');
      opt.value = p.id;
      const available = status[p.id] !== false;
      opt.textContent = `${p.label}${available ? '' : ' ⚠ no key'}`;
      if (p.id === t.provider) opt.selected = true;
      grp.appendChild(opt);
    }
    provSel.appendChild(grp);
  }

  provSel.addEventListener('change', async () => {
    await saveTranslation(pair.id, { provider: provSel.value });
  });
  providerRow.appendChild(provSel);
  footer.appendChild(providerRow);

  const saveStatus = document.createElement('span');
  saveStatus.className = 'save-status';
  saveStatus.id = `save-status-${pair.id}`;
  saveStatus.textContent = '✓ Saved';
  footer.appendChild(saveStatus);

  panel.appendChild(footer);
  return panel;
}

async function saveTranslation(pairId, partial) {
  try {
    await api('PATCH', `/api/pairs/${pairId}/translation`, partial);
    flashSaved(`save-status-${pairId}`);
  } catch (err) {
    showToast(`Save failed: ${err.message}`, 'error');
  }
}

async function saveMediaSync(pairId, partial) {
  try {
    await api('PATCH', `/api/pairs/${pairId}/media-sync`, partial);
    flashSaved(`media-save-status-${pairId}`);
  } catch (err) {
    showToast(`Save failed: ${err.message}`, 'error');
  }
}

function flashSaved(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 1500);
}

// ── Media panel ───────────────────────────────────────────────────────────────

const TG_MEDIA_TYPES = [
  { key: 'photo',     label: '🖼 Photos' },
  { key: 'video',     label: '🎬 Videos' },
  { key: 'audio',     label: '🎵 Audio files' },
  { key: 'voice',     label: '🎙 Voice messages' },
  { key: 'document',  label: '📄 Documents & files' },
  { key: 'sticker',   label: '😄 Stickers' },
  { key: 'animation', label: '🎞 Animations (GIFs)' },
  { key: 'videoNote', label: '⭕ Video notes (round)' },
  { key: 'location',  label: '📍 Locations' },
  { key: 'poll',      label: '📊 Polls' },
];

const DC_MEDIA_TYPES = [
  { key: 'image',    label: '🖼 Images' },
  { key: 'video',    label: '🎬 Videos' },
  { key: 'audio',    label: '🎵 Audio' },
  { key: 'document', label: '📄 Documents & files' },
];

function buildMediaPanel(pair) {
  const ms = pair.mediaSync ?? {
    tgToDiscord: Object.fromEntries(TG_MEDIA_TYPES.map(t => [t.key, true])),
    discordToTg: Object.fromEntries(DC_MEDIA_TYPES.map(t => [t.key, true]))
  };

  const panel = document.createElement('div');
  panel.className = 'media-panel';
  panel.id = `media-${pair.id}`;

  const heading = document.createElement('h3');
  heading.textContent = 'Media Sync — per type';
  panel.appendChild(heading);

  const grid = document.createElement('div');
  grid.className = 'media-grid';

  // TG → DC column
  const tgCol = document.createElement('div');
  tgCol.className = 'media-section';
  const tgTitle = document.createElement('h4');
  tgTitle.textContent = '🔵 Telegram → Discord';
  tgCol.appendChild(tgTitle);

  for (const { key, label } of TG_MEDIA_TYPES) {
    const enabled = ms.tgToDiscord?.[key] !== false;
    const row = document.createElement('div');
    row.className = 'toggle-row';
    const tog = toggle(`ms-tgdc-${pair.id}-${key}`, enabled, async (val) => {
      await saveMediaSync(pair.id, { tgToDiscord: { [key]: val } });
    });
    const lbl = document.createElement('span');
    lbl.className = 'toggle-label';
    lbl.textContent = label;
    row.appendChild(tog);
    row.appendChild(lbl);
    tgCol.appendChild(row);
  }

  // DC → TG column
  const dcCol = document.createElement('div');
  dcCol.className = 'media-section';
  const dcTitle = document.createElement('h4');
  dcTitle.textContent = '🟣 Discord → Telegram';
  dcCol.appendChild(dcTitle);

  for (const { key, label } of DC_MEDIA_TYPES) {
    const enabled = ms.discordToTg?.[key] !== false;
    const row = document.createElement('div');
    row.className = 'toggle-row';
    const tog = toggle(`ms-dctg-${pair.id}-${key}`, enabled, async (val) => {
      await saveMediaSync(pair.id, { discordToTg: { [key]: val } });
    });
    const lbl = document.createElement('span');
    lbl.className = 'toggle-label';
    lbl.textContent = label;
    row.appendChild(tog);
    row.appendChild(lbl);
    dcCol.appendChild(row);
  }

  grid.appendChild(tgCol);
  grid.appendChild(dcCol);
  panel.appendChild(grid);

  // Save indicator
  const footer = document.createElement('div');
  footer.style.cssText = 'margin-top:12px;display:flex;justify-content:flex-end';
  const saved = document.createElement('span');
  saved.className = 'save-status';
  saved.id = `media-save-status-${pair.id}`;
  saved.textContent = '✓ Saved';
  footer.appendChild(saved);
  panel.appendChild(footer);

  return panel;
}

// ── Render pair card ──────────────────────────────────────────────────────────

function renderPair(pair) {
  const card = document.createElement('div');
  card.className = 'pair-card';
  card.id = `pair-${pair.id}`;

  // Header
  const header = document.createElement('div');
  header.className = 'pair-header';

  const ids = document.createElement('div');
  ids.className = 'pair-ids';

  if (pair.label) {
    const lbl = document.createElement('span');
    lbl.className = 'badge label';
    lbl.textContent = pair.label;
    ids.appendChild(lbl);
  }

  const tgBadge = document.createElement('span');
  tgBadge.className = 'badge tg';
  tgBadge.textContent = `TG: ${pair.telegramChatId}`;

  const arrow = document.createElement('span');
  arrow.style.color = 'var(--muted)';
  arrow.textContent = '↔';

  const dcBadge = document.createElement('span');
  dcBadge.className = 'badge dc';
  dcBadge.textContent = `DC: ${pair.discordChannelId}`;

  const transBadge = document.createElement('span');
  transBadge.className = 'badge';
  transBadge.id = `trans-badge-${pair.id}`;
  transBadge.style.cssText = pair.translation?.enabled
    ? 'background:rgba(87,242,135,.12);color:var(--success)'
    : 'background:var(--surface2);color:var(--muted)';
  transBadge.textContent = pair.translation?.enabled ? 'Translation ON' : 'Translation OFF';

  ids.append(tgBadge, arrow, dcBadge, transBadge);

  const actions = document.createElement('div');
  actions.className = 'pair-actions';

  // Helper: toggle panel open/close and update button label
  function panelToggle(btnEl, panelId, openLabel = 'Close', closedLabel) {
    const p = document.getElementById(panelId);
    // Close other open panels on this card first
    card.querySelectorAll('.translation-panel.open, .media-panel.open').forEach(el => {
      if (el.id !== panelId) {
        el.classList.remove('open');
        // Reset sibling button text
        const siblingBtn = card.querySelector(`[data-panel="${el.id}"]`);
        if (siblingBtn) siblingBtn.textContent = siblingBtn.dataset.closed;
      }
    });
    p.classList.toggle('open');
    btnEl.textContent = p.classList.contains('open') ? openLabel : closedLabel;
  }

  const transBtn = document.createElement('button');
  transBtn.className = 'btn-ghost btn-sm';
  transBtn.textContent = 'Translation';
  transBtn.dataset.panel  = `trans-${pair.id}`;
  transBtn.dataset.closed = 'Translation';
  transBtn.addEventListener('click', () => panelToggle(transBtn, `trans-${pair.id}`, 'Close ×', 'Translation'));

  const mediaBtn = document.createElement('button');
  mediaBtn.className = 'btn-ghost btn-sm';
  mediaBtn.textContent = 'Media';
  mediaBtn.dataset.panel  = `media-${pair.id}`;
  mediaBtn.dataset.closed = 'Media';
  mediaBtn.addEventListener('click', () => panelToggle(mediaBtn, `media-${pair.id}`, 'Close ×', 'Media'));

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-danger btn-sm';
  delBtn.textContent = 'Delete';
  delBtn.addEventListener('click', async () => {
    if (!confirm('Remove this pair?')) return;
    try {
      await api('DELETE', `/api/pairs/${pair.id}`);
      card.remove();
      showToast('Pair removed.', 'ok');
      checkEmpty();
      refreshStatus();
    } catch (err) {
      showToast(`Error: ${err.message}`, 'error');
    }
  });

  actions.append(transBtn, mediaBtn, delBtn);
  header.append(ids, actions);
  card.appendChild(header);
  card.appendChild(buildTranslationPanel(pair));
  card.appendChild(buildMediaPanel(pair));
  return card;
}

function checkEmpty() {
  const list = document.getElementById('pairs-list');
  const empty = document.getElementById('empty-state');
  const hasPairs = list.children.length > 0;
  empty.style.display = hasPairs ? 'none' : 'block';
}

// ── Load pairs ───────────────────────────────────────────────────────────────

async function loadPairs() {
  const list = document.getElementById('pairs-list');
  list.innerHTML = '';
  try {
    const pairs = await api('GET', '/api/pairs');
    for (const pair of pairs) list.appendChild(renderPair(pair));
    checkEmpty();
  } catch (err) {
    showToast(`Failed to load pairs: ${err.message}`, 'error');
  }
}

// ── Add pair form ────────────────────────────────────────────────────────────

document.getElementById('add-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const label    = document.getElementById('f-label').value.trim();
  const tgId     = document.getElementById('f-tg').value.trim();
  const dcId     = document.getElementById('f-dc').value.trim();
  const webhook  = document.getElementById('f-wh').value.trim();

  if (!tgId || !dcId || !webhook) return;

  try {
    const pair = await api('POST', '/api/pairs', {
      label, telegramChatId: tgId, discordChannelId: dcId, discordWebhookUrl: webhook
    });
    document.getElementById('pairs-list').prepend(renderPair(pair));
    checkEmpty();
    e.target.reset();
    showToast('Pair added!', 'ok');
    refreshStatus();
  } catch (err) {
    showToast(`Error: ${err.message}`, 'error');
  }
});

// ── Init ─────────────────────────────────────────────────────────────────────

loadPairs();
refreshStatus();
setInterval(refreshStatus, 30_000);
</script>
